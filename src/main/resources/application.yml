server:
  port: 8080

spring:
  application:
    name: enterprisepet-backend
  datasource:
    url: jdbc:h2:mem:enterprisepet
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway manages the schema; Hibernate should only validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
# License master key: 32 random bytes, base64-encoded (RFC 4648).
#
# IMPORTANT:
# - There is no default value. You MUST set LICENSE_SECRET_KEY.
# - If the value matches the previously committed default key, the application
#   will refuse to start (except when the 'test' profile is active).
#
# Generate a key with:
#   openssl rand -base64 32
#
# It is strongly recommended to always provide this via environment variable,
# even during local development.
license:
  secret-key: "${LICENSE_SECRET_KEY:}"

steam:
  api-key: "YOUR_STEAM_WEB_API_KEY"
  # Base URL for Steam Web API. Override in tests with WireMock or in different environments.
  api-base-url: "https://api.steampowered.com"

# -----------------------------------------------------------------------------
# Ownership Provider Configuration
# -----------------------------------------------------------------------------
# Use these toggles to enable or disable individual ownership providers.
# This is useful for:
#   - Disabling a provider during development
#   - Gradually rolling out new providers
#   - Running without certain external dependencies
#
# All providers default to enabled (matchIfMissing = true).
ownership:
  providers:
    steam:
      enabled: true
    microsoft:
      enabled: true
    nft:
      enabled: true

ethereum:
  rpc-url: "https://eth-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"

microsoft:
  # "consumers" for personal Microsoft accounts, or a tenant GUID for AAD.
  tenant: "consumers"
  collections-url: "https://collections.mp.microsoft.com/v6.0/collections/query"
  market: "US"
  # dev-mode bypasses the real Microsoft Collections API and grants ownership for any
  # non-blank request. NEVER enable outside local development.
  dev-mode: ${MICROSOFT_DEV_MODE:false}

# JWT auth — short-lived bearer token issued alongside the encrypted license.
# secret-key is REQUIRED; no default. Generate with: openssl rand -base64 48
jwt:
  secret-key: "${JWT_SECRET_KEY:}"
  issuer: "enterprisepet-backend"
  ttl-minutes: 30

bundle:
  base-url: "${BUNDLE_BASE_URL:https://cdn.enterprisepet.example/bundles}"
  signing-key: "${BUNDLE_SIGNING_KEY:}"

# Admin API key for /api/admin/* endpoints (Phase 2 internal tooling).
# Must be a strong random value. Generate: openssl rand -base64 32
admin:
  api-key: "${ADMIN_API_KEY:}"

# -----------------------------------------------------------------------------
# Observability (Phase 1)
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # Enables /actuator/health/liveness and /readiness for Kubernetes
  health:
    defaults:
      enabled: true

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.enterprisepet

# -----------------------------------------------------------------------------
# Resilience4j (Phase 2.3) — defaults for the three ownership providers
# -----------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    instances:
      steam:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      microsoft:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      nft:
        slidingWindowSize: 8
        minimumNumberOfCalls: 4
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 2
  retry:
    instances:
      steam:
        maxAttempts: 3
        waitDuration: 500ms
      microsoft:
        maxAttempts: 3
        waitDuration: 500ms
      nft:
        maxAttempts: 2
        waitDuration: 300ms
